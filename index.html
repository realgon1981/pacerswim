<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>PACER Swim</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Micro+5&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --water-deep: #04141c;
      --water-mid:  #062430;
      --hud:        #00ff00;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      background: var(--water-deep);
      overflow: hidden;
    }

    .page {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background:
        radial-gradient(120% 80% at 50% 0%, var(--water-mid) 0%, var(--water-deep) 70%);
    }

    /* 영상 무대: 화면 가로폭에 맞춤 (9:16), 상/하단 cover 잘림 */
    .stage {
      position: relative;
      width: 100vw;
      aspect-ratio: 9 / 16;
      background: #000;
      overflow: hidden;
      flex: 0 0 auto;
    }

    .stage video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /*
      HUD: 영상 캔버스가 아니라 화면(뷰포트) 기준 고정 배치.
      .page(전체 화면)에 고정 px 로 올린다 → 브라우저 크기와 무관하게 일정 크기.
    */
    .hud {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 5;
      font-family: 'Micro 5', system-ui, sans-serif;
      color: var(--hud);
      text-shadow: 0 0 12px rgba(0,255,0,0.55), 0 0 4px rgba(0,255,0,0.8);
    }

    /* 메인 타이머: 화면 세로 중앙 (고정 크기) */
    .hud-timer {
      position: absolute;
      left: 0; right: 0;
      top: 50%;
      transform: translateY(-50%);
      text-align: center;
      font-size: 84px;
      line-height: 1;
      white-space: nowrap;
    }

    /* 하단 상태/랩타임: 타이머 아래 (고정 오프셋) */
    .hud-status {
      position: absolute;
      left: 0; right: 0;
      top: 50%;
      transform: translateY(52px);
      text-align: center;
      font-size: 48px;
      line-height: 1;
      white-space: nowrap;
    }

    /* 상단 HR: 타이머 위 (고정 오프셋) */
    .hud-hr {
      position: absolute;
      left: 0; right: 0;
      top: 50%;
      transform: translateY(-104px);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 18px;
    }
    .hud-hr .hr-num {
      font-size: 54px;
      line-height: 1;
      white-space: nowrap;
    }
    /* 하트 픽셀 아이콘 (Figma 도트 배열, 모바일 환산 약 0.56배 → 5px 그리드) */
    .heart {
      position: relative;
      width: 25px;
      height: 25px;
      flex: 0 0 auto;
      margin-top: 4px;
    }
    .heart i {
      position: absolute;
      width: 5px;
      height: 5px;
      background: var(--hud);
      box-shadow: 0 0 6px rgba(0,255,0,0.6);
    }

    /* 로고 텍스트 */
    .hud-logo-title {
      position: absolute;
      left: 0; right: 0;
      top: 50%;
      transform: translateY(-50%);
      text-align: center;
      font-size: 84px;
      line-height: 1;
      letter-spacing: 0.06em;
      white-space: nowrap;
    }
    .hud-logo-top {
      position: absolute;
      left: 0; right: 0;
      top: 50%;
      transform: translateY(-104px);
      text-align: center;
      font-size: 40px;
      line-height: 1;
      letter-spacing: 0.08em;
      white-space: nowrap;
    }

    /*
      이메일: 화면(브라우저) 하단 고정. Roboto 폰트.
      영상 캔버스가 아니라 뷰포트 하단 기준이라 데스크탑에서 가로가 길어져도 항상 노출.
    */
    .hud-mail {
      position: fixed;
      left: 0; right: 0;
      bottom: 28px;
      text-align: center;
      font-family: 'Roboto', system-ui, sans-serif;
      font-weight: 500;
      font-size: 16px;
      letter-spacing: 0.02em;
      color: var(--hud);
      text-shadow: 0 0 8px rgba(0,255,0,0.45);
      z-index: 6;
      pointer-events: none;
      white-space: nowrap;
    }

    .hidden { visibility: hidden; }

    /* 자동재생 차단 안내 */
    .tap-hint {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      color: rgba(255,255,255,0.85);
      font-family: system-ui, sans-serif;
      font-size: 15px;
      letter-spacing: 0.04em;
      background: rgba(0,0,0,0.35);
      cursor: pointer;
      z-index: 10;
    }
    .tap-hint.show { display: flex; }
  </style>
</head>
<body>
  <div class="page">
    <div class="stage" id="stage">
      <video
        id="bg"
        src="pacer_web_kv.mp4"
        muted
        loop
        playsinline
        autoplay
        preload="auto"
        poster="pacer.jpg"></video>
    </div>
  </div>

  <!-- HUD: 화면(뷰포트) 기준 고정 -->
  <div class="hud" id="hud">
    <div class="hud-hr" id="hrRow">
      <div class="heart" id="heart"></div>
      <div class="hr-num" id="hrNum">096</div>
    </div>
    <div class="hud-timer" id="timer">00:00:0</div>
    <div class="hud-status" id="status">START SWIM</div>

    <div class="hud-logo-top hidden" id="logoTop">COMMING SOON</div>
    <div class="hud-logo-title hidden" id="logoTitle">PACER</div>
  </div>

  <!-- 이메일: 화면 하단 고정 (항상 표시) -->
  <div class="hud-mail hidden" id="logoMail">realgon@pacerswim.com</div>

  <div class="tap-hint" id="tapHint">탭하여 재생 / Tap to play</div>

  <script>
  (function () {
    'use strict';

    /* ===== 설정값 (영상 시간 기준, 초) ===== */
    const CFG = {
      logoIntroEnd: 1.0,
      countStart:   3.2,
      countStartVal: 0.1,
      turnTime:     21.1,
      turnBlinkEnd: 24.1,
      finishTime:   34.2,
      finishBlinkEnd: 37.2,
      hrStart: 96,
      hrEnd:   161,
    };

    const video  = document.getElementById('bg');
    const stage  = document.getElementById('stage');
    const elTimer  = document.getElementById('timer');
    const elStatus = document.getElementById('status');
    const elHrRow  = document.getElementById('hrRow');
    const elHrNum  = document.getElementById('hrNum');
    const elLogoTop = document.getElementById('logoTop');
    const elLogoTitle = document.getElementById('logoTitle');
    const elLogoMail  = document.getElementById('logoMail');
    const hint = document.getElementById('tapHint');

    /* ===== 하트 픽셀 아이콘 (Figma 도트 배열, 5px 그리드) ===== */
    const G = 5;
    const heartDots = [
      [3,0],[1,0],[2,1],[0,1],[1,1],[0,0],
      [4,0],[3,1],[4,1],[2,2],[0,2],[1,2],
      [3,2],[2,3],[2,4],[1,3],[3,3],[4,2]
    ];
    (function buildHeart(){
      const heart = document.getElementById('heart');
      heartDots.forEach(([x,y]) => {
        const d = document.createElement('i');
        d.style.left = (x*G) + 'px';
        d.style.top  = (y*G) + 'px';
        heart.appendChild(d);
      });
    })();

    /* ===== 타이머 포맷: 초 → MM:SS:t ===== */
    function fmt(totalSec) {
      if (totalSec < 0) totalSec = 0;
      const m = Math.floor(totalSec / 60);
      const s = Math.floor(totalSec % 60);
      const t = Math.floor((totalSec * 10) % 10);
      const mm = String(m).padStart(2,'0');
      const ss = String(s).padStart(2,'0');
      return mm + ':' + ss + ':' + t;
    }
    function pad3(n){ return String(Math.round(n)).padStart(3,'0'); }

    function hrBlinkVisible(t) { return (t % 1) < 0.8; }
    function fastBlinkVisible(t) { return (Math.floor(t * 2) % 2) === 0; }

    function setLogoMode(on) {
      elTimer.style.display  = on ? 'none' : '';
      elStatus.style.display = on ? 'none' : '';
      elHrRow.style.display  = on ? 'none' : '';
      elLogoTop.classList.toggle('hidden', !on);
      elLogoTitle.classList.toggle('hidden', !on);
      elLogoMail.classList.toggle('hidden', !on);
    }

    function update() {
      const vt = video.currentTime;

      if (vt < CFG.logoIntroEnd) {
        setLogoMode(true);

      } else if (vt < CFG.countStart) {
        setLogoMode(false);
        elTimer.textContent = '00:00:0';
        elTimer.style.visibility = 'visible';
        elStatus.style.visibility = 'visible';
        elStatus.textContent = 'START SWIM';
        updateHR(vt);

      } else if (vt < CFG.turnTime) {
        setLogoMode(false);
        const tval = CFG.countStartVal + (vt - CFG.countStart);
        elTimer.style.visibility = 'visible';
        elTimer.textContent = fmt(tval);
        elStatus.style.visibility = 'visible';
        elStatus.textContent = 'START';
        updateHR(vt);

      } else if (vt < CFG.turnBlinkEnd) {
        // 가운데 타이머는 계속 흐름, 하단 랩타임만 3초 점멸
        setLogoMode(false);
        const vis = fastBlinkVisible(vt - CFG.turnTime);
        const tval = CFG.countStartVal + (vt - CFG.countStart);
        elTimer.style.visibility = 'visible';
        elTimer.textContent = fmt(tval);
        elStatus.textContent = '00:21:1';
        elStatus.style.visibility = vis ? 'visible' : 'hidden';
        updateHR(vt);

      } else if (vt < CFG.finishTime) {
        setLogoMode(false);
        const tval = CFG.countStartVal + (vt - CFG.countStart);
        elTimer.style.visibility = 'visible';
        elTimer.textContent = fmt(tval);
        elStatus.style.visibility = 'visible';
        elStatus.textContent = '00:21:1';
        updateHR(vt);

      } else if (vt < CFG.finishBlinkEnd) {
        // 종료: 타이머 00:34:2 정지 + 3초 점멸, HR 동반 점멸
        setLogoMode(false);
        const vis = fastBlinkVisible(vt - CFG.finishTime);
        elTimer.textContent = fmt(34.2);
        elTimer.style.visibility = vis ? 'visible' : 'hidden';
        elStatus.style.visibility = 'visible';
        elStatus.textContent = '00:21:1';
        elHrRow.style.visibility = vis ? 'visible' : 'hidden';
        elHrNum.textContent = pad3(CFG.hrEnd);

      } else {
        setLogoMode(true);
      }

      requestAnimationFrame(update);
    }

    function updateHR(vt) {
      elHrRow.style.display = '';
      let ratio = (vt - CFG.countStart) / (CFG.finishTime - CFG.countStart);
      ratio = Math.max(0, Math.min(1, ratio));
      const hr = CFG.hrStart + (CFG.hrEnd - CFG.hrStart) * ratio;
      elHrNum.textContent = pad3(hr);
      elHrRow.style.visibility = hrBlinkVisible(vt) ? 'visible' : 'hidden';
    }

    /* ===== 재생 제어 ===== */
    function tryPlay() {
      const p = video.play();
      if (p && typeof p.then === 'function') {
        p.then(() => hint.classList.remove('show'))
         .catch(() => hint.classList.add('show'));
      }
    }
    hint.addEventListener('click', () => { video.play(); hint.classList.remove('show'); });
    stage.addEventListener('click', () => {
      if (video.paused) { video.play(); hint.classList.remove('show'); }
    });

    window.addEventListener('load', () => {
      tryPlay();
      requestAnimationFrame(update);
    });
  })();
  </script>
</body>
</html>
