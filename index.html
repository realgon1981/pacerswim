<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>PACER Swim</title>
  <style>
    :root {
      --water-deep: #04141c;
      --water-mid:  #062430;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      background: var(--water-deep);
      overflow: hidden;
    }

    /*
      page: 화면 전체.
      - 영상을 세로 중앙 정렬: align-items center
      - 가로 중앙 정렬: justify-content center
      - 여백은 수중 그라디언트 (영상 위/아래 동일하게 분배)
    */
    .page {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background:
        radial-gradient(120% 80% at 50% 0%, var(--water-mid) 0%, var(--water-deep) 70%);
    }

    /*
      stage: 영상 무대 = 영상 가로폭.
      - width: 100vw → 브라우저 가로폭에 맞춤 (넓으면 영상도 넓어지고 상/하단 잘림)
      - min-width: 720px → 브라우저가 720px보다 좁아도 영상 가로는 720px 유지 (중앙 정렬, 위/아래 여백)
      - aspect-ratio 9/16 → 가로폭에 비례해 세로 높이 자동 결정
    */
    .stage {
      position: relative;
      width: 100vw;
      min-width: 720px;
      aspect-ratio: 9 / 16;
      background: #000;
      overflow: hidden;
      flex: 0 0 auto;
    }

    .stage video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .tap-hint {
      position: absolute;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      color: rgba(255,255,255,0.85);
      font-family: system-ui, sans-serif;
      font-size: 15px;
      letter-spacing: 0.04em;
      background: rgba(0,0,0,0.35);
      cursor: pointer;
    }
    .tap-hint.show { display: flex; }
  </style>
</head>
<body>
  <div class="page">
    <div class="stage">
      <video
        id="bg"
        src="pacer_web_kv.mp4"
        muted
        loop
        playsinline
        autoplay
        preload="auto"
        poster="pacer.jpg"></video>
      <div class="tap-hint" id="tapHint">탭하여 재생 / Tap to play</div>
    </div>
  </div>

  <script>
    const video = document.getElementById('bg');
    const hint = document.getElementById('tapHint');

    function tryPlay() {
      const p = video.play();
      if (p && typeof p.then === 'function') {
        p.then(() => { hint.classList.remove('show'); })
         .catch(() => { hint.classList.add('show'); });
      }
    }

    hint.addEventListener('click', () => { video.play(); hint.classList.remove('show'); });
    document.querySelector('.stage').addEventListener('click', () => {
      if (video.paused) { video.play(); hint.classList.remove('show'); }
    });

    window.addEventListener('load', tryPlay);
  </script>
</body>
</html>
