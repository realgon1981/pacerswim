<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>PACER Swim</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Micro+5&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --water-deep: #04141c;
      --water-mid:  #062430;
      --hud:        #00ff00;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      background: var(--water-deep);
      overflow: hidden;
    }

    .page {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background:
        radial-gradient(120% 80% at 50% 0%, var(--water-mid) 0%, var(--water-deep) 70%);
    }

    /* 영상 무대: 화면 가로폭에 맞춤 (9:16), 상/하단 cover 잘림 */
    .stage {
      position: relative;
      width: 100vw;
      aspect-ratio: 9 / 16;
      background: #000;
      overflow: hidden;
      flex: 0 0 auto;
    }

    .stage video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /*
      HUD: 영상 캔버스가 아니라 화면(뷰포트) 기준 고정 배치.
      .page(전체 화면)에 고정 px 로 올린다 → 브라우저 크기와 무관하게 일정 크기.
    */
    .hud {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 5;
      font-family: 'Micro 5', system-ui, sans-serif;
      color: var(--hud);
      text-shadow: 0 0 12px rgba(0,255,0,0.55), 0 0 4px rgba(0,255,0,0.8);
    }

    /* 메인 타이머: 화면 세로 중앙 (고정 크기) */
    .hud-timer {
      position: absolute;
      left: 0; right: 0;
      top: 50%;
      transform: translateY(-50%);
      text-align: center;
      font-size: 84px;
      line-height: 1;
      white-space: nowrap;
    }

    /* 하단 상태/랩타임: 타이머 아래 (고정 오프셋) */
    .hud-status {
      position: absolute;
      left: 0; right: 0;
      top: 50%;
      transform: translateY(52px);
      text-align: center;
      font-size: 48px;
      line-height: 1;
      white-space: nowrap;
    }

    /* 상단 HR: 타이머 위 (고정 오프셋) */
    .hud-hr {
      position: absolute;
      left: 0; right: 0;
      top: 50%;
      transform: translateY(-104px);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 18px;
    }
    .hud-hr .hr-num {
      font-size: 54px;
      line-height: 1;
      white-space: nowrap;
    }
    /* 하트 픽셀 아이콘 (Figma 도트 배열, 모바일 환산 약 0.56배 → 5px 그리드) */
    .heart {
      position: relative;
      width: 25px;
      height: 25px;
      flex: 0 0 auto;
      margin-top: 4px;
    }
    .heart i {
      position: absolute;
      width: 5px;
      height: 5px;
      background: var(--hud);
      box-shadow: 0 0 6px rgba(0,255,0,0.6);
    }

    /* 로고 텍스트 */
    .hud-logo-title {
      position: absolute;
      left: 0; right: 0;
      top: 50%;
      transform: translateY(-50%);
      text-align: center;
      font-size: 84px;
      line-height: 1;
      letter-spacing: 0.06em;
      white-space: nowrap;
    }
    .hud-logo-top {
      position: absolute;
      left: 0; right: 0;
      top: 50%;
      transform: translateY(-104px);
      text-align: center;
      font-size: 40px;
      line-height: 1;
      letter-spacing: 0.08em;
      white-space: nowrap;
    }

    /*
      연락처(contact): 화면(브라우저) 하단 고정, 상시 표시. Roboto 폰트.
      각 정보가 한 줄씩 세로 배열. .contact-line 을 추가하면 항목 확장.
      뷰포트 하단 기준이라 데스크탑에서 가로가 길어져도 항상 노출.
    */
    .contact {
      position: fixed;
      left: 0; right: 0;
      bottom: 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      font-family: 'Roboto', system-ui, sans-serif;
      font-weight: 500;
      font-size: 16px;
      letter-spacing: 0.02em;
      color: var(--hud);
      text-shadow: 0 0 8px rgba(0,255,0,0.45);
      z-index: 12;
      pointer-events: auto;
      user-select: text;
      -webkit-user-select: text;
      white-space: nowrap;
    }
    .contact-line {
      line-height: 1.3;
      cursor: text;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /*
      제품 로고 컨테이너 (예약 영역).
      추후 제품 로고 완성 시 #brandLogo 안에 <img> 또는 SVG 삽입.
      연락처 바로 위, 화면 하단 고정. 현재는 내용 없어 화면에 표시되지 않음.
    */
    .brand-logo {
      position: fixed;
      left: 0; right: 0;
      bottom: 72px;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 12;
      pointer-events: none;
    }
    .brand-logo img,
    .brand-logo svg {
      max-width: 160px;
      max-height: 40px;
      width: auto;
      height: auto;
      display: block;
    }
    /* 복사 버튼 */
    .copy-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 22px;
      height: 22px;
      padding: 0;
      background: none;
      border: none;
      cursor: pointer;
      pointer-events: auto;
      opacity: 0.85;
      transition: opacity 0.15s ease;
      flex: 0 0 auto;
    }
    .copy-btn:hover { opacity: 1; }
    .copy-btn svg { width: 18px; height: 18px; display: block; }
    /* 복사 완료 피드백 */
    .copy-feedback {
      font-family: 'Roboto', system-ui, sans-serif;
      font-size: 13px;
      color: var(--hud);
      opacity: 0;
      transition: opacity 0.15s ease;
      pointer-events: none;
    }
    .copy-feedback.show { opacity: 1; }

    .hidden { visibility: hidden; }

    /* 자동재생 차단 안내 */
    .tap-hint {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      color: rgba(255,255,255,0.85);
      font-family: system-ui, sans-serif;
      font-size: 15px;
      letter-spacing: 0.04em;
      background: rgba(0,0,0,0.35);
      cursor: pointer;
      z-index: 10;
    }
    .tap-hint.show { display: flex; }
  </style>
</head>
<body>
  <div class="page">
    <div class="stage" id="stage">
      <video
        id="bg"
        src="pacer_web_kv.mp4"
        muted
        loop
        playsinline
        autoplay
        preload="auto"
        poster="pacer.jpg"></video>
    </div>
  </div>

  <!-- HUD: 화면(뷰포트) 기준 고정 -->
  <div class="hud" id="hud">
    <div class="hud-hr" id="hrRow">
      <div class="heart" id="heart"></div>
      <div class="hr-num" id="hrNum">096</div>
    </div>
    <div class="hud-timer" id="timer">00:00:0</div>
    <div class="hud-status" id="status">START SWIM</div>

    <div class="hud-logo-top hidden" id="logoTop">COMING SOON</div>
    <div class="hud-logo-title hidden" id="logoTitle">PACER</div>
  </div>

  <!--
    제품 로고 예약 영역. 로고 완성 시 아래 #brandLogo 안에 삽입:
      <img src="brand_logo.svg" alt="PACER">  (또는 인라인 SVG)
    현재는 비어 있어 화면에 표시되지 않음.
  -->
  <div class="brand-logo" id="brandLogo"></div>

  <!-- 연락처: 화면 하단 고정, 상시 표시. 줄(.contact-line) 추가로 항목 확장 -->
  <div class="contact" id="contact">
    <div class="contact-line">
      <span id="emailText">contact : realgon@pacerswim.com</span>
      <button class="copy-btn" id="copyBtn" type="button" aria-label="이메일 주소 복사" title="이메일 주소 복사">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M15 17H17.8C18.9201 17 19.48 17 19.9078 16.782C20.2841 16.5902 20.5905 16.2844 20.7822 15.908C21.0002 15.4802 21.0002 14.9202 21.0002 13.8V4.20002C21.0002 3.07992 21.0002 2.51986 20.7822 2.09204C20.5905 1.71572 20.2841 1.40973 19.9078 1.21799C19.48 1 18.9203 1 17.8002 1H12.2002C11.0801 1 10.5196 1 10.0918 1.21799C9.71547 1.40973 9.40973 1.71572 9.21799 2.09204C9 2.51986 9 3.07997 9 4.20007V7.00007M3 19.8001V10.2001C3 9.07997 3 8.51986 3.21799 8.09204C3.40973 7.71572 3.71547 7.40973 4.0918 7.21799C4.51962 7 5.08009 7 6.2002 7H11.8002C12.9203 7 13.48 7 13.9078 7.21799C14.2841 7.40973 14.5905 7.71572 14.7822 8.09204C15.0002 8.51986 15.0002 9.07992 15.0002 10.2V19.8C15.0002 20.9202 15.0002 21.4802 14.7822 21.908C14.5905 22.2844 14.2841 22.5902 13.9078 22.782C13.48 23 12.9203 23 11.8002 23H6.2002C5.08009 23 4.51962 23 4.0918 22.782C3.71547 22.5902 3.40973 22.2844 3.21799 21.908C3 21.4802 3 20.9202 3 19.8001Z" stroke="#00FF00" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
      <span class="copy-feedback" id="copyFeedback">Copied</span>
    </div>
    <!-- 항목 추가 예시 (주석 해제하여 사용):
    <div class="contact-line">tel : +82 10-0000-0000</div>
    <div class="contact-line">address : 경기도 부천시 ...</div>
    -->
  </div>

  <div class="tap-hint" id="tapHint">탭하여 재생 / Tap to play</div>

  <script>
  (function () {
    'use strict';

    /* ===== 설정값 (영상 시간 기준, 초) ===== */
    const CFG = {
      logoIntroEnd: 1.0,
      countStart:   3.2,
      countStartVal: 0.1,
      turnTime:     21.1,
      turnBlinkEnd: 24.1,
      finishTime:   35.3,
      finishBlinkEnd: 38.3,
      hrStart: 96,
      hrEnd:   161,
    };

    const video  = document.getElementById('bg');
    const stage  = document.getElementById('stage');
    const elTimer  = document.getElementById('timer');
    const elStatus = document.getElementById('status');
    const elHrRow  = document.getElementById('hrRow');
    const elHrNum  = document.getElementById('hrNum');
    const elLogoTop = document.getElementById('logoTop');
    const elLogoTitle = document.getElementById('logoTitle');
    const hint = document.getElementById('tapHint');

    /* ===== 하트 픽셀 아이콘 (Figma 도트 배열, 5px 그리드) ===== */
    const G = 5;
    const heartDots = [
      [3,0],[1,0],[2,1],[0,1],[1,1],[0,0],
      [4,0],[3,1],[4,1],[2,2],[0,2],[1,2],
      [3,2],[2,3],[2,4],[1,3],[3,3],[4,2]
    ];
    (function buildHeart(){
      const heart = document.getElementById('heart');
      heartDots.forEach(([x,y]) => {
        const d = document.createElement('i');
        d.style.left = (x*G) + 'px';
        d.style.top  = (y*G) + 'px';
        heart.appendChild(d);
      });
    })();

    /* ===== 타이머 포맷: 초 → MM:SS:t ===== */
    function fmt(totalSec) {
      if (totalSec < 0) totalSec = 0;
      const m = Math.floor(totalSec / 60);
      const s = Math.floor(totalSec % 60);
      const t = Math.floor((totalSec * 10) % 10);
      const mm = String(m).padStart(2,'0');
      const ss = String(s).padStart(2,'0');
      return mm + ':' + ss + ':' + t;
    }
    function pad3(n){ return String(Math.round(n)).padStart(3,'0'); }

    function hrBlinkVisible(t) { return (t % 1) < 0.8; }
    function fastBlinkVisible(t) { return (Math.floor(t * 2) % 2) === 0; }

    function setLogoMode(on) {
      elTimer.style.display  = on ? 'none' : '';
      elStatus.style.display = on ? 'none' : '';
      elHrRow.style.display  = on ? 'none' : '';
      elLogoTop.classList.toggle('hidden', !on);
      elLogoTitle.classList.toggle('hidden', !on);
    }

    function update() {
      const vt = video.currentTime;

      if (vt < CFG.logoIntroEnd) {
        setLogoMode(true);

      } else if (vt < CFG.countStart) {
        setLogoMode(false);
        elTimer.textContent = '00:00:0';
        elTimer.style.visibility = 'visible';
        elStatus.style.visibility = 'visible';
        elStatus.textContent = 'START SWIM';
        updateHR(vt);

      } else if (vt < CFG.turnTime) {
        setLogoMode(false);
        const tval = CFG.countStartVal + (vt - CFG.countStart);
        elTimer.style.visibility = 'visible';
        elTimer.textContent = fmt(tval);
        elStatus.style.visibility = 'visible';
        elStatus.textContent = 'START';
        updateHR(vt);

      } else if (vt < CFG.turnBlinkEnd) {
        // 가운데 타이머는 계속 흐름, 하단 랩타임만 3초 점멸
        setLogoMode(false);
        const vis = fastBlinkVisible(vt - CFG.turnTime);
        const tval = CFG.countStartVal + (vt - CFG.countStart);
        elTimer.style.visibility = 'visible';
        elTimer.textContent = fmt(tval);
        elStatus.textContent = '00:18:1';
        elStatus.style.visibility = vis ? 'visible' : 'hidden';
        updateHR(vt);

      } else if (vt < CFG.finishTime) {
        setLogoMode(false);
        const tval = CFG.countStartVal + (vt - CFG.countStart);
        elTimer.style.visibility = 'visible';
        elTimer.textContent = fmt(tval);
        elStatus.style.visibility = 'visible';
        elStatus.textContent = '00:18:1';
        updateHR(vt);

      } else if (vt < CFG.finishBlinkEnd) {
        // 종료: 타이머 00:32:2 정지 + 3초 점멸, HR·하단 랩타임 동반 점멸
        setLogoMode(false);
        const vis = fastBlinkVisible(vt - CFG.finishTime);
        elTimer.textContent = fmt(32.2);
        elTimer.style.visibility = vis ? 'visible' : 'hidden';
        elStatus.textContent = '00:18:1';
        elStatus.style.visibility = vis ? 'visible' : 'hidden';
        elHrRow.style.visibility = vis ? 'visible' : 'hidden';
        elHrNum.textContent = pad3(CFG.hrEnd);

      } else {
        setLogoMode(true);
      }

      requestAnimationFrame(update);
    }

    function updateHR(vt) {
      elHrRow.style.display = '';
      // PPG 센서는 1초에 한 번 측정 → HR 표시도 정수 초 단위로 양자화하여
      // 1초 동안 같은 값 유지, 다음 초(refresh=점멸)에만 새 값으로 갱신.
      const quantT = Math.floor(vt);
      let ratio = (quantT - CFG.countStart) / (CFG.finishTime - CFG.countStart);
      ratio = Math.max(0, Math.min(1, ratio));
      // ease-in (n=2): 초반 완만하게, 후반으로 갈수록 급격히 증가
      const eased = ratio * ratio;
      const hr = CFG.hrStart + (CFG.hrEnd - CFG.hrStart) * eased;
      elHrNum.textContent = pad3(hr);
      elHrRow.style.visibility = hrBlinkVisible(vt) ? 'visible' : 'hidden';
    }

    /* ===== 재생 제어 ===== */
    function tryPlay() {
      const p = video.play();
      if (p && typeof p.then === 'function') {
        p.then(() => hint.classList.remove('show'))
         .catch(() => hint.classList.add('show'));
      }
    }
    hint.addEventListener('click', () => { video.play(); hint.classList.remove('show'); });
    stage.addEventListener('click', () => {
      if (video.paused) { video.play(); hint.classList.remove('show'); }
    });

    window.addEventListener('load', () => {
      tryPlay();
      requestAnimationFrame(update);
    });

    /* ===== 이메일 복사 기능 ===== */
    (function () {
      const EMAIL = 'realgon@pacerswim.com';
      const btn = document.getElementById('copyBtn');
      const feedback = document.getElementById('copyFeedback');
      if (!btn) return;

      let timer = null;
      function showCopied() {
        feedback.classList.add('show');
        if (timer) clearTimeout(timer);
        timer = setTimeout(() => feedback.classList.remove('show'), 1500);
      }

      async function copyEmail() {
        try {
          await navigator.clipboard.writeText(EMAIL);
          showCopied();
        } catch (e) {
          // 구형 브라우저 / 비보안 컨텍스트 폴백
          const ta = document.createElement('textarea');
          ta.value = EMAIL;
          ta.style.position = 'fixed';
          ta.style.opacity = '0';
          document.body.appendChild(ta);
          ta.select();
          try { document.execCommand('copy'); showCopied(); } catch (_) {}
          document.body.removeChild(ta);
        }
      }
      btn.addEventListener('click', copyEmail);
    })();
  })();
  </script>
</body>
</html>
